server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin proxy to the deployed character-lookup Worker. After a
    # one-time `wrangler deploy`, paste the resulting `<slug>.workers.dev`
    # URL in place of WORKER_HOST below. Keeping the SPA's API call at
    # `/api/*` means no CORS, no preflights, and no environment-specific
    # base URL in browser code.
    location /api/ {
        proxy_pass https://WORKER_HOST/api/;
        proxy_set_header Host WORKER_HOST;
        proxy_ssl_server_name on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}